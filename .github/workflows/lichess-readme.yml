name: Lichess card

# Re-render EclipseBOT's latest-game board and commit it so the README image
# stays current — a no-Vercel replacement for the Lichess-Game-Readme serverless
# app. Ratings in the README are live shields.io badges and need no job here.

on:
  schedule:
    # Hourly at :23 (avoid the top-of-hour scheduler congestion). UTC.
    - cron: "23 * * * *"
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write            # needed to commit the regenerated SVG

concurrency:
  group: lichess-card        # never overlap two updater runs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python-chess
        run: pip install "chess>=1.11"

      - name: Render latest-game card
        run: python dev/scripts/gen_lichess_card.py

      - name: Push to assets branch (force, no main history noise)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Save the freshly rendered SVG before switching branches.
          cp assets/lichess_latest_game.svg /tmp/lichess_latest_game.svg

          # Switch to the orphan assets branch (single ever-amended commit).
          # Force-pushing it keeps main's history clean.
          git fetch origin assets
          git checkout assets

          cp /tmp/lichess_latest_game.svg assets/lichess_latest_game.svg
          git add assets/lichess_latest_game.svg

          if git diff --cached --quiet; then
            echo "No new game — card unchanged."
          else
            git commit --amend --no-edit
            git push --force origin assets
          fi
