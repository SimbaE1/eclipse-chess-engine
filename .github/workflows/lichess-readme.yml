name: Lichess card

# Re-render EclipseBOT's latest-game board and commit it so the README image
# stays current — a no-Vercel replacement for the Lichess-Game-Readme serverless
# app. Ratings in the README are live shields.io badges and need no job here.

on:
  schedule:
    # Hourly at :23 (avoid the top-of-hour scheduler congestion). UTC.
    - cron: "23 * * * *"
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write            # needed to commit the regenerated SVG

concurrency:
  group: lichess-card        # never overlap two updater runs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python-chess
        run: pip install "chess>=1.11"

      - name: Render latest-game card
        run: python dev/scripts/gen_lichess_card.py

      - name: Push to assets branch (force, no main history noise)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Push the SVG directly to the assets branch using git plumbing —
          # no branch switch needed, works with shallow clones. The assets
          # branch always holds a single root commit (force-pushed each time),
          # so main's history stays completely clean.
          git fetch origin assets

          REMOTE_BLOB=$(git ls-tree origin/assets assets/lichess_latest_game.svg 2>/dev/null | awk '{print $3}')
          LOCAL_BLOB=$(git hash-object assets/lichess_latest_game.svg)

          if [ "$REMOTE_BLOB" = "$LOCAL_BLOB" ]; then
            echo "No new game — card unchanged."
            exit 0
          fi

          BLOB=$(git hash-object -w assets/lichess_latest_game.svg)
          TREE=$(printf '100644 blob %s\tassets/lichess_latest_game.svg\n' "$BLOB" | git mktree)
          COMMIT=$(git commit-tree "$TREE" -m "chore: auto-generated assets (CI)")
          git push --force origin "$COMMIT:refs/heads/assets"
